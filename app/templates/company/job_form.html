{% extends "base.html" %}
{% block title %}Post Job · Placement Portal{% endblock %}
{% block content %}
<section class="form-page">
    <form class="panel wide" method="post">
        <h1>Post a Job</h1>
        <div class="grid two">
            <label>Title <input name="title" required></label>
            <label>Location <input name="location" required></label>
            <label>Package (LPA) <input type="number" step="0.01" min="0" name="package_lpa" required></label>
            <label>Minimum CGPA <input type="number" step="0.01" min="0" max="10" name="min_cgpa" required></label>
        </div>
        <label>Description <textarea name="description" rows="5" required></textarea></label>
        <label class="check"><input type="checkbox" name="active" checked> Active</label>
        <button type="submit">Publish</button>
    </form>
</section>
{% endblock %}
