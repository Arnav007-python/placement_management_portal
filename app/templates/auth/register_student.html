{% extends "base.html" %}
{% block title %}Student Registration · Placement Portal{% endblock %}
{% block content %}
<section class="form-page">
    <form class="panel wide" method="post">
        <h1>Student Registration</h1>
        <div class="grid two">
            <label>Name <input name="name" required></label>
            <label>Email <input type="email" name="email" required></label>
            <label>Password <input type="password" name="password" minlength="6" required></label>
            <label>Department <input name="department" required></label>
            <label>Graduation Year <input type="number" name="graduation_year" min="2024" max="2035" required></label>
            <label>CGPA <input type="number" step="0.01" min="0" max="10" name="cgpa" required></label>
        </div>
        <label>Skills <textarea name="skills" rows="3" placeholder="Python, SQL, React"></textarea></label>
        <button type="submit">Create account</button>
    </form>
</section>
{% endblock %}
